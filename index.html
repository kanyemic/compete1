<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>医影挑战赛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "SF Pro Text", "SF Pro SC", "PingFang SC", "Helvetica Neue", sans-serif;
        background: linear-gradient(180deg, #f5f5f7 0%, #eceef3 100%);
        color: #1e293b; /* Slate 800 */
        overflow-x: hidden;
      }

      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }

      html, body, #root {
        min-height: 100%;
      }
      
      .font-display {
        font-family: "SF Pro Display", "SF Pro SC", "PingFang SC", "Helvetica Neue", sans-serif;
      }

      .bg-pattern {
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.9), rgba(255,255,255,0) 34%),
          linear-gradient(180deg, #f5f5f7 0%, #eceef3 100%);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      .app-safe-screen {
        padding-top: max(12px, var(--safe-top));
        padding-right: max(12px, var(--safe-right));
        padding-bottom: max(12px, var(--safe-bottom));
        padding-left: max(12px, var(--safe-left));
      }

      .app-safe-header {
        padding-top: max(16px, calc(var(--safe-top) + 6px));
      }

      .app-safe-bottom {
        padding-bottom: max(16px, var(--safe-bottom));
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-pattern min-h-screen text-slate-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
